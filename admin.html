<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Chat - Advanced Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #f3f4f6;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; margin-bottom: 30px; }
        
        .feedback-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #e5e7eb; position: relative; }
        .fb-header { display: flex; justify-content: space-between; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 15px; }
        .fb-name { font-weight: 700; font-size: 1.2rem; color: #111827; }
        .fb-email { color: #6b7280; font-size: 0.85rem; }
        .fb-stars { color: #fbbf24; font-size: 1.3rem; }
        
        .fb-text { background: #f8fafc; padding: 15px; border-radius: 12px; font-style: italic; color: #334155; border-left: 4px solid var(--primary); margin-bottom: 15px; }
        
        .actions { display: flex; gap: 10px; justify-content: flex-end; }
        .btn { padding: 10px 18px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .btn-reply { background: var(--primary); color: white; }
        .btn-delete { background: #fee2e2; color: var(--danger); }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; }
        textarea { width: 100%; padding: 15px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; margin: 15px 0; font-family: inherit; resize: none; box-sizing: border-box; }
        
        .loading { text-align: center; margin-top: 50px; font-weight: 600; color: #6b7280; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Admin Feedback Dashboard</h1>
            <p>Manage reviews & reply to users</p>
        </div>

        <div id="feedbacks-container">
            <div class="loading">Fetching data... 🚀</div>
        </div>
    </div>

    <div id="replyModal" class="modal">
        <div class="modal-content">
            <h3 id="replyTitle">Reply to User</h3>
            <textarea id="replyText" rows="5" placeholder="Type your message here..."></textarea>
            <div class="actions">
                <button class="btn" onclick="closeModal()" style="background:#e2e8f0">Cancel</button>
                <button class="btn btn-reply" id="confirmReplyBtn">Send Message</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove, push, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // --- NEW FIREBASE CONFIG APPLIED ---
        const firebaseConfig = {
            apiKey: "AIzaSyBOqTZTgkFYfnd318pJTlWC86oSjXzb3mE",
            authDomain: "pvt-chat-df40d.firebaseapp.com",
            databaseURL: "https://pvt-chat-df40d-default-rtdb.firebaseio.com",
            projectId: "pvt-chat-df40d",
            storageBucket: "pvt-chat-df40d.firebasestorage.app",
            messagingSenderId: "506549084982",
            appId: "1:506549084982:web:3b3af391261aab8e53c997",
            measurementId: "G-DSKGN9ZWEF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const container = document.getElementById('feedbacks-container');
        let currentReplyData = null;

        // Fetch Feedbacks
        onValue(ref(db, 'feedbacks'), (snap) => {
            container.innerHTML = '';
            if(snap.exists()) {
                snap.forEach(child => {
                    const fb = child.val();
                    const fbId = child.key;
                    const date = fb.timestamp ? new Date(fb.timestamp).toLocaleDateString() : 'N/A';
                    const stars = '★'.repeat(fb.rating || 0) + '☆'.repeat(5 - (fb.rating || 0));

                    container.innerHTML += `
                        <div class="feedback-card" id="card-${fbId}">
                            <div class="fb-header">
                                <div>
                                    <div class="fb-name">${fb.name}</div>
                                    <div class="fb-email">${fb.email}</div>
                                </div>
                                <div class="fb-stars">${stars}</div>
                            </div>
                            <div class="fb-text">"${fb.text}"</div>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-size:0.75rem; color:#94a3b8">Date: ${date}</span>
                                <div class="actions">
                                    <button class="btn btn-delete" onclick="deleteFeedback('${fbId}')">🗑️ Delete</button>
                                    <button class="btn btn-reply" onclick="openReplyModal('${fb.uid}', '${fb.name}', '${fbId}')">💬 Reply</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = '<div class="loading">No feedbacks found.</div>';
            }
        });

        // Delete Logic
        window.deleteFeedback = (id) => {
            if(confirm("Are you sure you want to delete this feedback?")) {
                remove(ref(db, `feedbacks/${id}`));
            }
        };

        // Reply Logic
        window.openReplyModal = (uid, name, fbId) => {
            if(!uid || uid === 'anonymous') return alert("Cannot reply to anonymous users!");
            currentReplyData = { uid, name, fbId };
            document.getElementById('replyTitle').innerText = `Reply to ${name}`;
            document.getElementById('replyModal').style.display = 'flex';
        };

        window.closeModal = () => {
            document.getElementById('replyModal').style.display = 'none';
            document.getElementById('replyText').value = '';
        };

        document.getElementById('confirmReplyBtn').onclick = async () => {
            const text = document.getElementById('replyText').value.trim();
            if(!text) return alert("Please type something!");

            const userUid = currentReplyData.uid;
            const roomId = "REPLY_" + userUid; 
            
            const roomData = {
                id: roomId,
                name: "Admin Feedback Reply",
                icon: "https://cdn-icons-png.flaticon.com/512/681/681494.png",
                type: "private",
                adminId: "ADMIN"
            };

            try {
                await set(ref(db, `rooms/${roomId}`), roomData);
                await set(ref(db, `room_members/${roomId}/${userUid}`), { role: 'member' });
                await set(ref(db, `user_chats/${userUid}/${roomId}`), { joinedAt: Date.now() });

                const msgRef = push(ref(db, `messages/${roomId}`));
                await set(msgRef, {
                    text: text,
                    type: 'text',
                    senderId: "ADMIN",
                    senderName: "Support Team",
                    senderImg: "https://ui-avatars.com/api/?name=Admin&background=000&color=fff",
                    timestamp: Date.now()
                });

                alert("Reply sent to user's chat successfully!");
                closeModal();
            } catch (e) {
                alert("Error: " + e.message);
            }
        };
    </script>
</body>
</html>
